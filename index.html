<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iMatrice Platinum - Imane BAHA</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js"></script>
    <style>
        :root { 
            --primary: #4338ca; --dark: #0f172a; --bg: #f8fafc; 
            --success: #059669; --error: #dc2626; --light-bg: #fafbfc; --border: #e2e8f0; 
        }
        body { background: var(--bg); font-family: 'Inter', sans-serif; display: flex; height: 100vh; margin: 0; overflow: hidden; }

        .sidebar { width: 260px; background: var(--dark); color: white; padding: 20px; display: flex; flex-direction: column; flex-shrink: 0; }
        .logo-area { border-bottom: 1px solid #334155; padding-bottom: 15px; margin-bottom: 15px; }
        .btn-m { background: #1e293b; color: white; padding: 12px; border: none; border-radius: 8px; margin-bottom: 8px; width: 100%; cursor: pointer; font-size: 0.85rem; transition: 0.3s; text-align: left; }
        .btn-m.active { background: var(--primary); }

        .viewport { flex: 1; display: flex; flex-direction: column; background: white; margin: 10px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); overflow: hidden; }
        header { padding: 15px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        #chat-flow { flex: 1; padding: 20px; overflow-y: auto; background: var(--light-bg); display: flex; flex-direction: column; gap: 15px; }

        .bubble { max-width: 90%; padding: 15px; border-radius: 15px; line-height: 1.4; font-size: 0.95rem; animation: fadeIn 0.3s ease; word-wrap: break-word; }
        .bot { background: white; border: 1px solid var(--border); align-self: flex-start; }
        .user { background: var(--primary); color: white; align-self: flex-end; }

        .math-display { font-size: 1.2rem; text-align: center; margin: 10px 0; color: var(--dark); padding: 15px; border-radius: 10px; border-left: 4px solid var(--primary); background: #f8fafc; overflow-x: auto; }

        .input-bar { padding: 20px; display: flex; gap: 10px; border-top: 1px solid var(--border); background: white; }
        input { flex: 1; padding: 12px; border: 2px solid var(--border); border-radius: 10px; font-size: 1rem; outline: none; }

        .panel-right { width: 280px; background: white; border-left: 1px solid var(--border); padding: 15px; display: flex; flex-direction: column; gap: 15px; flex-shrink: 0; }
        .rule-box { background: #ecfdf5; border: 2px solid var(--success); padding: 15px; border-radius: 10px; font-size: 0.85rem; color: #065f46; transition: 0.3s; min-height: 130px; }
        .rule-error { background: #fef2f2 !important; border-color: var(--error) !important; color: #991b1b !important; }

        .lvl-btn { flex: 1; padding: 10px; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; background: white; font-weight: bold; font-size: 0.8rem; }
        .lvl-btn.active-lvl { background: var(--primary); color: white; border-color: var(--primary); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo-area">
            <h3 style="color:#818cf8; margin:0">iMatrice Platinum</h3>
            <p style="font-size:0.7rem; color:#94a3b8; margin:5px 0 0">PFE : <b>Imane BAHA</b></p>
        </div>
        <button class="btn-m" onclick="selectDomain(1, this, 'mohamedd sadiss mamah malha?')">🇲🇽 mamak malha?</button>
        <button class="btn-m" onclick="selectDomain(2, this, 'yassir tle9 stylo')">ustadaa imane just test sorryy🥹 (Générateur)</button>
        <button class="btn-m" onclick="selectDomain(3, this, 'Dérivation')">✍️ Dérivation< khdohaa daba/button>
        <button class="btn-m" onclick="selectDomain(4, this, 'badr wldii')">📊 Étude de Fonctions</button>
        <div style="margin-top:auto">
            <button id="send-btn" onclick="sendReport()" style="background:#059669; color:white; border:none; padding:10px; border-radius:8px; width:100%; cursor:pointer; font-weight:bold;">🇲🇽🇲🇽🇲🇽 Envoyer mes résultats</button>
        </div>
    </aside>

    <main class="viewport">
        <header>
            <div style="font-size: 0.9rem">👤 <span id="nomE">...</span></div>
            <div id="lvl-picker" style="display:none; gap:5px;">
                <button class="lvl-btn" onclick="startExercises(1, this)">Niveau 1</button>
                <button class="lvl-btn" onclick="startExercises(2, this)">Niveau 2</button>
                <button class="lvl-btn" onclick="startExercises(3, this)">Niveau 3</button>
            </div>
            <div style="font-weight:900; color:var(--primary); font-size: 0.9rem">XP: <span id="xp">0</span></div>
        </header>
        <div id="chat-flow"></div>
        <div class="input-bar">
            <input type="text" id="ui" placeholder="Entrez votre réponse...">
            <button onclick="checkAnswer()" style="background:var(--primary); color:white; border:none; padding:10px 20px; border-radius:10px; cursor:pointer; font-weight:bold;">OK</button>
        </div>
    </main>

    <aside class="panel-right">
        <p style="font-size:0.75rem; font-weight:bold; color:#64748b; margin:0">💡 CARNET PÉDAGOGIQUE</p>
        <div id="rule-box" class="rule-box">Sélectionnez un module pour commencer.</div>
        <textarea id="brouillon" style="flex:1; border:1px solid var(--border); border-radius:10px; padding:10px; font-size:0.8rem; resize:none;" placeholder="Zone de brouillon..."></textarea>
    </aside>

    <script>
        let nom = '', currentMod = 0, currentModName = '', currentLvl = 0, score = 0, currentAns = '', currentRule = '', usedExos = [];

        const normalize = (str) => str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim().replace(/\s/g, "");

        const exoData = {
            1: [
                {lvl:1, q:"\\text{Soit }(U_n)\\text{ une suite arithmétique : } U_0=5, r=2. \\text{ Calculez } U_1", sol:"7", rule:"U_{n+1} = U_n + r"},
                {lvl:1, q:"\\text{Soit }(U_n)\\text{ une suite géométrique : } U_0=2, q=3. \\text{ Calculez } U_2", sol:"18", rule:"U_n = U_0 \\times q^n"},
                {lvl:2, q:"\\text{Soit }(U_n)\\text{ arithmétique : } U_0=1, r=2. \\text{ Somme } S_3 = U_0+U_1+U_2+U_3", sol:"16", rule:"S_n = (n+1) \\times (U_0 + U_n)/2"},
                {lvl:3, q:"U_{n+1}=U_n+4. \\text{ Quelle est la nature de cette suite ?}", sol:"arithmetique", rule:"La différence entre deux termes est constante (r=4)."},
                {lvl:3, q:"\\text{Soit }(U_n)\\text{ géométrique : } U_0=5, q=3. \\text{ Donnez } U_n", sol:"5*3^n", rule:"Formule générale : U_n = U_0 \\times q^n"}
            ],
            3: [
                {lvl:1, q:"f(x) = x^2 + 3x. \\text{ Calculez } f'(x)", sol:"2x+3", rule:"La dérivée de x^n est nx^{n-1}."},
                {lvl:2, q:"f'(x) = 2x - 6. \\text{ Quel est le signe de } f' \\text{ sur } ]-\\infty, 3[ ?", sol:"negatif", rule:"Résoudre l'inéquation 2x - 6 < 0."},
                {lvl:3, q:"f''(x) = 6x. \\text{ Donnez l'intervalle où } f' \\text{ est croissante.}", sol:"0,+inf", rule:"La dérivée est croissante là où sa propre dérivée (f'') est positive."}
            ],
            4: [
                {lvl:1, q:"\\lim_{x \\to 2} f(x) = \\infty. \\text{ Nature de l'asymptote ?}", sol:"verticale", rule:"Limite infinie en un point x=a -> Asymptote Verticale."},
                {lvl:2, q:"\\lim_{x \\to +\\infty} \\frac{f(x)}{x} = 0. \\text{ Nature de la branche ?}", sol:"parabolique vers Ox", rule:"Direction l'axe des abscisses (Ox)."},
                {lvl:3, q:"f''(x) = x^2 + 1. \\text{ Quelle est la concavité de } C_f ?", sol:"convexe", rule:"f''(x) > 0 sur tout R, donc la courbe est convexe (tournée vers le haut)."}
            ]
        };

        function generateLimit(lvl) {
            let a = Math.floor(Math.random() * 8) + 2;
            let b = Math.floor(Math.random() * 15) + 1;
            if (lvl === 1) return { q: `\\lim_{x \\to +\\infty} (${a}x^2 + ${b}x)`, sol: "+inf", rule: "On garde le monôme de plus haut degré." };
            else if (lvl === 2) return { q: `\\lim_{x \\to +\\infty} \\frac{${a}x + ${b}}{x}`, sol: a.toString(), rule: "Rapport des coefficients des plus hauts degrés." };
            else {
                let x0 = Math.floor(Math.random() * 3) + 1;
                return { q: `\\lim_{x \\to ${x0}} \\frac{x^2 - ${x0*x0}}{x - ${x0}}`, sol: (2*x0).toString(), rule: "Identité : x²-a² = (x-a)(x+a)." };
            }
        }

        window.onload = () => {
            nom = prompt("Nom de l'élève :") || "Apprenant";
            document.getElementById('nomE').innerText = nom;
            addMsg("bot", `Système <b>iMatrice Platinum</b> chargé. Sélectionnez un module.`);
            document.getElementById('ui').addEventListener('keypress', (e) => { if (e.key === 'Enter') checkAnswer(); });
        };

        function selectDomain(m, btn, name) {
            currentMod = m; currentModName = name; usedExos = [];
            document.querySelectorAll('.btn-m').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('lvl-picker').style.display = 'flex';
            addMsg("bot", `Module <b>${name}</b> prêt. Choisissez un niveau.`);
        }

        function startExercises(l, btn) {
            currentLvl = l;
            document.querySelectorAll('.lvl-btn').forEach(b => b.classList.remove('active-lvl'));
            btn.classList.add('active-lvl');
            generate();
        }

        function generate() {
            let exo;
            if (currentMod === 2) exo = generateLimit(currentLvl);
            else {
                let pool = exoData[currentMod].filter(e => e.lvl === currentLvl);
                let available = pool.filter(e => !usedExos.includes(e.q));
                if (available.length === 0) { usedExos = []; available = pool; }
                exo = available[Math.floor(Math.random() * available.length)];
                usedExos.push(exo.q);
            }
            currentAns = exo.sol; currentRule = exo.rule;
            addMsg("bot", `<div class="math-display"></div>`);
            let containers = document.querySelectorAll('.math-display');
            katex.render(exo.q, containers[containers.length - 1], { throwOnError: false, displayMode: true });
        }

        function checkAnswer() {
            const input = document.getElementById('ui');
            if (!input.value.trim()) return;
            addMsg("user", input.value);
            let isOk = (normalize(input.value) === normalize(currentAns));
            const ruleBox = document.getElementById('rule-box');
            if (isOk) {
                score += (currentLvl * 10);
                document.getElementById('xp').innerText = score;
                addMsg("bot", "✨ <b>Excellent !</b>");
                ruleBox.className = 'rule-box';
                ruleBox.innerHTML = `<b>✅ Juste !</b><br>${currentRule}`;
            } else {
                addMsg("bot", `❌ <b>Oups !</b> La réponse était : <b>${currentAns}</b>.`);
                ruleBox.className = 'rule-box rule-error';
                ruleBox.innerHTML = `<b>📚 Rappel :</b><br>${currentRule}`;
            }
            input.value = '';
            setTimeout(generate, 2500);
        }

        function addMsg(type, html) {
            const flow = document.getElementById('chat-flow');
            const div = document.createElement('div'); div.className = `bubble ${type}`; div.innerHTML = html;
            flow.appendChild(div); flow.scrollTop = flow.scrollHeight;
        }

        async function sendReport() {
            const btn = document.getElementById('send-btn');

            const formData = {
                access_key: "30e06224-d840-4de2-921e-bb9f7f76e816",
                from_name: "iMatrice Platinum",
                subject: "Score de " + nom + " - iMatrice",
                nom_eleve: nom,
                score_final: score + " XP",
                module_etudie: currentModName || "Non sélectionné",
                date_envoi: new Date().toLocaleString('fr-FR')
            };

            try {
                btn.innerText = "⏳ Envoi...";
                btn.disabled = true;

                const response = await fetch("https://api.web3forms.com/submit", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Accept": "application/json" },
                    body: JSON.stringify(formData)
                });

                const result = await response.json();

                if (result.success) {
                    addMsg("bot", "✅ <b>Succès !</b> Tes résultats ont été envoyés par e-mail.");
                    btn.innerText = "Résultats envoyés";
                    btn.style.background = "#94a3b8";
                } else {
                    throw new Error();
                }
            } catch (error) {
                addMsg("bot", "❌ Erreur. Vérifiez votre connexion.");
                btn.disabled = false;
                btn.innerText = "Réessayer l'envoi";
            }
        }
    </script>
</body>
</html>
